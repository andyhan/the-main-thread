# src/main/resources/application.properties

# DataSource – Dev Services will spin up a PostgreSQL container automatically
# when no URL is configured. Nothing else needed for local development.
quarkus.datasource.db-kind=postgresql

# Schema management
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Disable batch collection loading so the N+1 is clearly visible in stats.
# Quarkus defaults this to 16, which partially masks N+1 problems.
quarkus.hibernate-orm.fetch.batch-size=-1

# ── Hibernate Statistics ────────────────────────────────────────────────────
# Enable the statistics mechanism so counters are collected.
quarkus.hibernate-orm.statistics=true

# Expose collected stats as Prometheus metrics on /q/metrics.
# Requires quarkus-micrometer-registry-prometheus on the classpath.
quarkus.hibernate-orm.metrics.enabled=true

# ── Logging ─────────────────────────────────────────────────────────────────
# Print a per-session summary in the log after each EntityManager is closed.
# Requires statistics=true above. Quarkus defaults log-session-metrics to false.
quarkus.hibernate-orm.log-session-metrics=true
# In Hibernate ORM 7+ the logger moved to org.hibernate.session.metrics at DEBUG level.
quarkus.log.category."org.hibernate.session.metrics".level=DEBUG

# Optional: see the SQL being executed so you can correlate it with the stats.
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
