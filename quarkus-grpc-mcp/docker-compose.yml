version: "3.8"

services:
  quarkus-grpc:
    image: localhost/meisele/quarkus-grpc-service:1.0.0-SNAPSHOT
    pull_policy: never
    ports:
      - "9000:9000"

  # Gateway: built from https://github.com/IBM/mcp-context-forge (main).
  context-forge:
    build: ./context-forge
    ports:
      - "4444:4444"
    depends_on:
      - quarkus-grpc
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      # Enable debug logging: uncomment the next line.
      - GUNICORN_CMD_ARGS=--log-level debug
      - DATABASE_URL=sqlite:///./mcp.db
      - MCPGATEWAY_UI_ENABLED=true
      - MCPGATEWAY_ADMIN_API_ENABLED=true
      - JWT_SECRET_KEY=my-test-key
      - PLATFORM_ADMIN_EMAIL=admin@example.com
      - PLATFORM_ADMIN_PASSWORD=changemE!
      - PLATFORM_ADMIN_FULL_NAME=Platform Administrator
      - ADMIN_REQUIRE_PASSWORD_CHANGE_ON_BOOTSTRAP=false
      - MCPGATEWAY_GRPC_ENABLED=true
