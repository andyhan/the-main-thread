# Database
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Form-based authentication (replaces Basic)
quarkus.http.auth.form.enabled=true
quarkus.http.auth.session.encryption-key=mySecretEncryptionKey16
quarkus.http.auth.form.login-page=login
quarkus.http.auth.form.landing-page=/
quarkus.http.auth.form.error-page=login

# Remember me: cookie survives browser close, 7 days inactivity timeout
quarkus.http.auth.form.cookie-max-age=30D
quarkus.http.auth.form.timeout=7D

# Prefer form login for browser: don't redirect to OIDC until user clicks "Sign in with GitHub"
quarkus.http.auth.proactive=false

# Permissions: login and form POST are public; /, /api, /logout, /github require auth (JAX-RS so @AuthorizationCodeFlow applies to /github)
quarkus.http.auth.permission.login.paths=/login,/j_security_check
quarkus.http.auth.permission.login.policy=permit
quarkus.http.auth.permission.authenticated.paths=/,/api,/logout,/github
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.authenticated.applies-to=jaxrs
# Accept both form and OIDC identities so GitHub-login users can access / and /api. Give form higher priority
# so unauthenticated users hitting / get the form login page, not a redirect to GitHub.
quarkus.http.auth.form.priority=2000
quarkus.oidc.priority=1000

# OIDC / GitHub (set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET in prod)
quarkus.oidc.provider=github
quarkus.oidc.client-id=${GITHUB_CLIENT_ID:your-client-id}
quarkus.oidc.credentials.secret=${GITHUB_CLIENT_SECRET:your-client-secret}
# Callback URL for GitHub OAuth App must be http://localhost:8080/github
quarkus.oidc.authentication.redirect-path=/github
# Fetch UserInfo so we can sync name/email to our DB and show it on home and /api/user
quarkus.oidc.authentication.user-info-required=true
