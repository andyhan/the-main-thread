<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset your password</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 1rem; }
        input[type="password"] { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; background: #0f62fe; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #c00; margin-top: 0.5rem; }
        .success { color: #198038; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h2>Reset your password</h2>
    <p>Enter your new password (at least 12 characters).</p>
    <form id="reset-form">
        <input type="hidden" name="token" value="{token}">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" minlength="12" required autocomplete="new-password">
        <div id="message" class="error" style="display: none;"></div>
        <button type="submit" id="submit-btn">Reset password</button>
    </form>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            var btn = document.getElementById('submit-btn');
            var msg = document.getElementById('message');
            var token = document.querySelector('input[name="token"]').value;
            var newPassword = document.getElementById('newPassword').value;
            btn.disabled = true;
            msg.style.display = 'none';
            msg.className = 'error';
            try {
                var res = await fetch('/auth/password-reset/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, newPassword: newPassword })
                });
                if (res.ok) {
                    msg.textContent = 'Password reset successfully. You can sign in with your new password.';
                    msg.className = 'success';
                    document.getElementById('reset-form').reset();
                    document.querySelector('input[name="token"]').value = token;
                } else {
                    var body = await res.text();
                    msg.textContent = body || 'Reset failed. Link may be invalid, already used, or expired.';
                    msg.style.display = 'block';
                }
            } catch (err) {
                msg.textContent = 'Request failed. Please try again.';
                msg.style.display = 'block';
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
