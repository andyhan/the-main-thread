quarkus.oidc.client-id=dpop-api
quarkus.oidc.application-type=service

# In dev, listen on all interfaces so port-forwarding (e.g. from host to container) works
%dev.quarkus.http.host=0.0.0.0

# Use DPoP-bound access tokens
quarkus.oidc.token.authorization-scheme=dpop

# Sign (login) and verify (OIDC) with the same keypair
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
quarkus.oidc.token.issuer=dpop-demo
dpop.jwt.issuer=dpop-demo

# Optional: Keycloak Dev Services (disable when using login-issued tokens only)
quarkus.keycloak.devservices.enabled=false

%dev.quarkus.log.category."io.quarkus.oidc".level=DEBUG