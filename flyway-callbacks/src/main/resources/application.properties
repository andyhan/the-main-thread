quarkus.hibernate-orm.schema-management.strategy = none
quarkus.hibernate-orm.log.sql = true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.flyway.callbacks = org.acme.callbacks.PreMigrationValidationCallback,org.acme.callbacks.MigrationTimingCallback,org.acme.callbacks.MigrationContextCallback
migration.destructive.allowed = false