# Dev Services supplies a PostgreSQL + pgvector datasource in dev mode, so JDBC URL
# and credentials are often omitted locally. For production or non-DevServices runs,
# set quarkus.datasource.jdbc.url, username, and password explicitly.
#
# Example (tutorial / local Docker):
# quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/default
# quarkus.datasource.username=postgres
# quarkus.datasource.password=postgres

# ----------------------------------------
# PostgreSQL / pgvector
# ----------------------------------------
quarkus.datasource.db-kind=postgresql

quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.dimension=384
quarkus.langchain4j.pgvector.create-table=true
quarkus.langchain4j.pgvector.drop-table-first=true
quarkus.langchain4j.pgvector.use-index=true
quarkus.langchain4j.pgvector.index-list-size=100

# ----------------------------------------
# Ollama
# ----------------------------------------
quarkus.langchain4j.ollama.chat-model.model-name=granite3.3:8b
quarkus.langchain4j.ollama.embedding-model.model-name=granite-embedding:latest
quarkus.langchain4j.ollama.timeout=120s

# ----------------------------------------
# Docling
# ----------------------------------------
quarkus.docling.devservices.enabled=true
quarkus.docling.devservices.enable-ui=true
quarkus.docling.timeout=10M
quarkus.docling.async-poll-interval=5S
quarkus.docling.async-timeout=10M

# Optional debugging
quarkus.docling.log-requests=false
quarkus.docling.log-responses=false